<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OperateApp">
<meta name="theme-color" content="#0a0a0c">
<title>Operate</title>
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="authSheet" class="auth-sheet">
  <div class="auth-card">
    <div class="auth-logo">Operate</div>
    <p class="auth-lead">Sign in with a magic link to sync your tour across devices.</p>
    <div class="field"><label>Email</label><input id="auth-email" type="email" class="input" placeholder="you@example.com" autocomplete="email"></div>
    <p id="auth-msg" class="auth-msg"></p>
    <button class="btn" id="auth-send" onclick="sendMagicLink()">Send magic link</button>
    <p class="auth-hint">Without signing in, data stays on this device only.</p>
  </div>
</div>
<div id="app">
  <div id="screen">
    <button id="sidebar-reveal" type="button" class="sidebar-reveal" onclick="toggleSidebar(false)" title="Show sidebar"></button>
    <div class="top-safe"></div><div id="view"></div></div>
  <button id="fab" class="fab" style="display:none"></button>
  <nav id="nav"></nav>
  <div id="scrim"></div>
  <div id="viewer"><button class="close" onclick="closeViewer()">✕</button><img id="viewer-img" src=""></div>
  <div id="lock"></div>
  <div id="toast"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/tour-logistics-catalog.js"></script>
<script src="js/state.js"></script>
<script src="js/db.js"></script>
<script src="js/sync.js"></script>
<script src="js/auth.js"></script>
<script src="js/shows.js"></script>
<script src="js/trip.js"></script>
<script src="js/calendar.js"></script>
<script src="js/ideas.js"></script>
<script src="js/notes.js"></script>
<script src="js/app.js"></script>
<script src="js/pwa.js"></script>
<script>authBoot();</script>
</body>
</html>
