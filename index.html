/* City-aware maps query — always append the show's city/area so searches resolve */
/* Turn a route token (Hotel / Airport / Venue / a place name) into a searchable place with city context. */
function resolvePlace(token, sh, city){
  const t=(token||'').replace(/\[[^\]]*\]/g,'').trim();
  if(!t) return '';
  if(/^venue$/i.test(t)) return sh?(cleanVenue(sh.venue)+' '+(sh.venueAddr||city||'')):('venue '+city);
  if(/^hotel$/i.test(t)) return (sh&&sh.hotel&&sh.hotel.name?sh.hotel.name+' ':'hotel ')+city;
  if(/^airport$/i.test(t)) return (city?city+' ':'')+'airport';
  return t + (city && !t.toLowerCase().includes(city.toLowerCase()) ? ' '+city : '');
}
/* A driver/transfer leg is a journey (origin > destination) — return both ends for directions. */
function driverRoute(l){
  const sh=(l&&l.showId)?sel.event(l.showId):null; const city=sh?(sh.city||''):'';
  const route=(l.title||'').replace(/^\[?[^-\]]*\]?\s*-\s*/,'');   // drop the "DRIVER -" / "[UBER] -" label
  const parts=route.split('>');
  if(parts.length<2) return null;
  const origin=resolvePlace(parts[0], sh, city);
  const dest=resolvePlace(parts[parts.length-1], sh, city);
  if(!origin||!dest) return null;
  return {origin, dest};
}
/* Open turn-by-turn directions (native Maps on iOS). */
function openDirections(origin, dest){
  const o=encodeURIComponent(origin), d=encodeURIComponent(dest);
  openExternal('https://www.google.com/maps/dir/?api=1&origin='+o+'&destination='+d, 'maps://?saddr='+o+'&daddr='+d);
  toast('Opening route','map');
}
function tlMapsQuery(s){
  const sh=stepShow(s); const city=sh?(sh.city||''):'';
  if(s.kind==='set'){ return sh?(cleanVenue(sh.venue)+' '+(sh.venueAddr||sh.city||'')):''; }
  if(s.kind==='stay'){ const name=(s.title||'').replace(/^.*hotel\s*-\s*/i,'').replace(/^\[[^\]]*\]\s*-?\s*/,'').trim(); return name+(city?' '+city:''); }
  if(s.kind==='travel'){
    const parts=(s.title||'').split('>'); let dest=parts.length>1?parts[parts.length-1].trim():'';
    if(/^venue$/i.test(dest)) return sh?(cleanVenue(sh.venue)+' '+(sh.venueAddr||sh.city||'')):dest;
    if(/^hotel$/i.test(dest)) return 'hotel '+(city||'');
    if(/^airport$/i.test(dest)) return (city?city+' ':'')+'airport';
    if((s.icon||'plane')==='plane' && /^[A-Z]{3}$/.test(dest)) return dest+' airport';
    return dest+(city&&!dest.toLowerCase().includes(city.toLowerCase())?' '+city:'');
  }
  return '';
}

      else { pills.push(`<div class="pill" onclick="event.stopPropagation();openItem('${it.id}')"><div class="ic">${ICON.car(16)}</div><div class="tx"><b>Driver</b><span>Add contact</span></div></div>`); }
      if(mq) pills.push(mapPill('Destination','Open in Maps'));
    }
  } else if(s.kind==='stay'){
    if(mq) pills.push(mapPill('Hotel','Open in Maps'));
    if(sh) pills.push(`<div class="pill" onclick="event.stopPropagation();openView('event','${sh.id}')"><div class="ic">${ICON.bed(16)}</div><div class="tx"><b>Details</b><span>Full show</span></div></div>`);
  } else if(s.kind==='set'){
    if(sh){
      if(mq) pills.push(mapPill('Venue', sh.venueAddr?esc(sh.venueAddr.slice(0,22)):'Open in Maps'));
      if(sh.promoter&&sh.promoter.phone) pills.push(`<div class="pill" onclick="event.stopPropagation();callNumber('${sh.promoter.phone}')"><div class="ic">${ICON.user(16)}</div><div class="tx"><b>Promoter</b><span>Call</span></div></div>`);

    }

  return pills.join('');

/* Group the run timeline by day (clearer, day-by-day) */
function runTimelineByDay(run){
  const rows=runTimeline(run); const byDay={};
  rows.forEach(r=>{ (byDay[r.date]=byDay[r.date]||[]).push(r); });
  return Object.keys(byDay).sort().map(d=>({date:d, rows:byDay[d]}));
}
/* Day-by-day, each day a collapsible dropdown — collapsed by default except the current day.
   Keeps Trip Mode calm: you only open the day you want. */
function dayTimeline(runKey, run){
  const groups=runTimelineByDay(run);
  if(!groups.length) return '<div class="hint">Add flights & hotels inside each show</div>';
  const next=runTimeline(run).find(s=>!s.done);
  const openDate=next?next.date:(groups[0]&&groups[0].date);
  const todayStr=(()=>{const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;})();
  return groups.map(g=>{
    const d=parseDT(g.date); const done=g.rows.filter(r=>r.done).length;
    const allDone=g.rows.length>0 && done===g.rows.length;
    const setRow=g.rows.find(r=>r.kind==='set');
    const label=DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]+(g.date===todayStr?' · Today':'');
    const sub=(setRow?setRow.title+' · ':'')+done+'/'+g.rows.length+' done'; // raw — foldSection escapes
    return foldSection('tld'+runKey+g.date, allDone?ICON.check(16):ICON.calendar(16), label, sub, g.rows.map(s=>tlRow(runKey,s)).join(''), allDone?false:(g.date===openDate), allDone?'fold-done':'');
  }).join('<div style="height:10px"></div>');
}

let calCursor = null; // {y,m}
function viewCalendar(){
  const now = new Date();
  if(!calCursor) calCursor = {y:now.getFullYear(), m:now.getMonth()};
  const {y,m} = calCursor;
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  const byDate = {};
  sel.events().forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });

  let cells = '';
  for(let i=0;i<startDow;i++){ const d=prevDays-startDow+i+1; cells+=`<div class="cal-cell other">${d}</div>`; }
  for(let d=1;d<=daysInMonth;d++){
    const ds = `${y}-${pad(m+1)}-${pad(d)}`;
    const evs = byDate[ds]||[];
    const sel_ = calSel===ds;
    cells += `<div class="cal-cell ${ds===todayStr?'today':''} ${evs.length?'has':''} ${sel_?'sel':''}" onclick="selectCalDay('${ds}')">

    </div>`;
  }
  const total = startDow+daysInMonth;
  for(let i=total;i%7!==0;i++){ cells+=`<div class="cal-cell other">${i-total+1}</div>`; }

  // Event list — selected day, else whole visible month sorted
  let listEvents;
  if(calSel){ listEvents = (byDate[calSel]||[]).slice().sort((a,b)=>(a.setTime||'').localeCompare(b.setTime||'')); }
  else { listEvents = store.events.filter(e=>{ const d=parseDT(e.date); return d&&d.getFullYear()===y&&d.getMonth()===m; }).sort((a,b)=>a.date.localeCompare(b.date)); }

    ${calGridOpen?`<div class="card fade-in" style="padding:16px 14px 14px">
      <div class="cal-head">
        <div class="cal-month">${MONTHS[m]} ${y}</div>
        <div class="cal-nav">
          <button onclick="calMove(-1)">${ICON.chevL(18)}</button>
          <button onclick="calToday()">${ICON.reminder(17)}</button>
          <button onclick="calMove(1)">${ICON.chevR(18)}</button>
        </div>
      </div>
      <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d[0]}</div>`).join('')}${cells}</div>
    </div>`:`
    <div class="card tap fade-in" style="padding:12px 16px;display:flex;align-items:center;gap:12px" onclick="toggleCalGrid()">
      <div style="color:var(--accent-2)">${ICON.calendar(18)}</div>
      <div style="flex:1"><b style="font-size:15px">${MONTHS[m]} ${y}</b></div>
      <div class="cal-nav"><button onclick="event.stopPropagation();calMove(-1)">${ICON.chevL(16)}</button><button onclick="event.stopPropagation();calMove(1)">${ICON.chevR(16)}</button></div>

/* Past shows — everything that finished more than 24h ago, newest first. */
function viewPastShows(){
  const past=store.events.filter(showPassed).sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  return `
  <div class="detail-top"><div class="detail-bar">

    ${past.length? `<div class="card flush">${past.map(eventRow).join('')}</div>` : `<div class="empty" style="margin-top:12px"><div class="ic">${ICON.calendar(26)}</div><b>No past shows yet</b><span>Shows land here 24h after they finish.</span></div>`}
    <div class="spacer"></div>
  </div>`;
}
/* A show counts as "past" 24h after its set finishes (endTime, else setTime, else end of day). */
function showPassed(e){
  if(e.kind && e.kind!=='show') return false;
  const t = e.endTime || e.setTime;
  let end = t ? parseDT(e.date, t) : parseDT(e.date);
  if(!end) return false;
  if(!t) end.setHours(23,59,0,0);
  return (Date.now() - end.getTime()) > 24*3600*1000;
}
/* Day-by-day agenda for a single month (ABOSS-style). Past shows drop out into the Past shows area. */
function monthAgenda(y,m,todayStr){
  const days={};
  store.events.forEach(e=>{ if(e.kind==='travel'||e.kind==='stay') return; // logistics live inside the show
    if(showPassed(e)) return; // moved to Past shows
    const d=parseDT(e.date); if(d&&d.getFullYear()===y&&d.getMonth()===m){ if(calSel && e.date!==calSel) return; (days[e.date]=days[e.date]||[]).push(e); } });
  const dates=Object.keys(days).sort();
  if(!dates.length) return `<div class="empty"><div class="ic">${ICON.calendar(26)}</div><b>Nothing ${calSel?'this day':'this month'}</b><span>Tap + to add a show.</span></div>`;
  return `<div class="stagger">`+dates.map(ds=>{
    const d=parseDT(ds); const items=days[ds].slice().sort(itemSort);
    return `<div class="agenda-day">
      <div class="agenda-date ${ds===todayStr?'today':''}"><span class="ad-dow">${DOW[d.getDay()]}</span><span class="ad-num">${d.getDate()}</span></div>
      <div class="agenda-list">${items.map(agendaItem).join('')}</div>
    </div>`;
  }).join('')+`</div>`;
}
function itemTimeKey(e){
  let hhmm = e.start || e.setTime || '';
  if(!hhmm && e.kind==='stay' && e.info){ const mt=e.info.match(/(\d{1,2}):(\d{2})/); if(mt) hhmm=mt[0]; }
  if(!hhmm) return -1;
  const [h,m]=hhmm.split(':').map(Number); let mins=h*60+(m||0);
  if(h<5) mins+=1440; // post-midnight items belong to the end of the touring day
  return mins;
}
function itemSort(a,b){
  const am=a.kind==='marker'?0:1, bm=b.kind==='marker'?0:1;
  if(am!==bm) return am-bm;              // all-day markers first
  return itemTimeKey(a)-itemTimeKey(b);  // then chronological (late-night last)
}
function legSort(a,b){ if((a.date||'')!==(b.date||'')) return (a.date||'').localeCompare(b.date||''); return itemTimeKey({start:a.start||a.info})-itemTimeKey({start:b.start||b.info}); }
function showLegs(eid){ return store.events.filter(x=>x.showId===eid && (x.kind==='travel'||x.kind==='stay')); }

}

  else if(ideaFilter!=='all') list = all.filter(i=>i.type===ideaFilter);
  const typesPresent = [...new Set(all.map(i=>i.type))];
  const chips = [{k:'all',l:'All '+all.length},{k:'active',l:'To use'},{k:'done',l:'Done'}, ...typesPresent.map(t=>({k:t,l:IDEA_TYPES[t].label}))];
  const toUse = all.filter(i=>!i.done).length;

  // Body: when showing "to use"/all unfiltered, group by priority; else flat grid
  let body;
  const grouped = (ideaFilter==='all'||ideaFilter==='active');
  if(!list.length){
    body = `<div class="empty"><div class="ic">${ICON.idea(28)}</div><b>No ideas here</b><span>Capture a reel concept, hook or caption above.</span></div>`;
  } else if(grouped){
    const active = list.filter(i=>!i.done);
    const done = ideaFilter==='all'? list.filter(i=>i.done):[];
    const byP = p => active.filter(i=>i.prio===p);
    const groups = [['high','High priority'],['med','Medium'],['low','Low']];
    body = groups.map(([p,label])=>{ const g=byP(p); if(!g.length) return '';
      return `<div class="prio-head"><span class="pd" style="background:${PRIO[p]}"></span>${label} · ${g.length}</div><div class="idea-grid stagger">${g.map(ideaCard).join('')}</div>`;
    }).join('') + (done.length?`<div class="prio-head"><span class="pd" style="background:var(--text-3)"></span>Done · ${done.length}</div><div class="idea-grid">${done.map(ideaCard).join('')}</div>`:'');
  } else {
    body = `<div class="idea-grid stagger">${list.map(ideaCard).join('')}</div>`;
  }

  return `
  <div class="lg-header">
    <div><div class="lg-title">Ideas</div><div class="lg-sub">Your creative brain · ${toUse} to use</div></div>
    <button class="header-btn" onclick="sheetIdea()">${ICON.plus(22)}</button>
  </div>
  <div class="screen-pad">
    <div class="idea-capture">
      <input id="idea-quick" placeholder="Capture an idea…" onkeydown="if(event.key==='Enter')quickIdea()">
      <button onclick="quickIdea()">${ICON.plus(20)}</button>
    </div>
    <div class="chips" style="margin-top:10px">${chips.map(c=>`<button class="chip ${ideaFilter===c.k?'on':''}" onclick="setIdeaFilter('${c.k}')">${esc(c.l)}</button>`).join('')}</div>
    <div class="section" style="margin-top:8px">${body}</div>
    <div class="spacer"></div>
  </div>`;
}

function attachIdeaTo(iid, kind){

  } else {
    const trips=sel.trips().filter(t=>!t.archived);
    if(!trips.length){ toast('No trips yet','x'); return; }

  }
}

/* Pull live gate/terminal/status/delay from the Supabase flight-status function. */
async function flightTrack(id){
  const e=store.events.find(x=>x.id===id); if(!e) return;
  if(!e.flightNo){ toast('Add a flight number first','x'); sheetFlightInfo(id); return; }
  if(!syncConfigured()){ toast('Set up cloud first','x'); return; }
  toast('Checking live status…','plane');
  try{
    const res=await fetch(SYNC_CONFIG.url.replace(/\/$/,'')+'/functions/v1/flight-status', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':SYNC_CONFIG.anon, 'Authorization':'Bearer '+SYNC_CONFIG.anon },
      body: JSON.stringify({ flight:e.flightNo, date:e.date })
    });
    const d=await res.json().catch(()=>null);
    if(!d || d.found===false){ toast(d&&d.error==='no_key'?'Flight key not set on server':'Flight not found for that date','x'); return; }
    if(d.status) e.fstatus=d.status;
    if(d.terminal) e.terminal=d.terminal;
    if(d.gate) e.gate=d.gate;
    e.delay=d.delay||'';
    e.fiUpdated=Date.now(); e.fiLive=true;
    persist(); renderView(); toast('Live status updated ✈︎','check');
  }catch(err){ toast('Could not reach flight service','x'); }
}

   File uploads (stored as data URLs — Phase 2: cloud storage)
   ============================================================ */
/* Shrink an image data URL (resize + JPEG) so it's small enough to store & sync.
   Screenshots go from multi-MB PNGs down to ~100-250KB. Falls back to original on any error. */
function compressImage(dataUrl, cb){
  try{
    const img=new Image();
    img.onload=()=>{
      try{
        const max=1500; let w=img.width, h=img.height;
        if(w>max||h>max){ const s=Math.min(max/w, max/h); w=Math.round(w*s); h=Math.round(h*s); }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        const out=c.toDataURL('image/jpeg',0.72);
        cb(out && out.length < dataUrl.length ? out : dataUrl);
      }catch(e){ cb(dataUrl); }
    };
    img.onerror=()=>cb(dataUrl);
    img.src=dataUrl;
  }catch(e){ cb(dataUrl); }
}
function readFile(input, cb){
  const f = input.files&&input.files[0]; if(!f) return;
  if(f.size > 12*1024*1024){ toast('File too large (12MB max)','x'); input.value=''; return; }
  const kind = f.type.startsWith('image/')?'image':'pdf';
  const r = new FileReader();
  r.onload = ()=>{ if(kind==='image'){ compressImage(r.result, d=>cb({id:uid('att'),kind,name:f.name,data:d})); } else cb({id:uid('att'), kind, name:f.name, data:r.result}); };
  r.onerror = ()=>toast('Upload failed','x');
  r.readAsDataURL(f);
  input.value='';
}
/* Read multiple files → array of attachments (images compressed), then callback once. */
function readFiles(input, cb){
  const all = Array.from(input.files||[]); input.value='';
  const files = all.filter(f=>f.size<=12*1024*1024);
  if(all.length>files.length) toast('Some files skipped (12MB max)','x');
  if(!files.length){ cb([]); return; }
  const out=[]; let done=0;
  const finish=()=>{ if(++done===files.length) cb(out); };
  files.forEach(f=>{
    const kind=f.type.startsWith('image/')?'image':'pdf';
    const r=new FileReader();
    r.onload=()=>{ if(kind==='image'){ compressImage(r.result, d=>{ out.push({id:uid('att'),kind,name:f.name,data:d}); finish(); }); } else { out.push({id:uid('att'),kind,name:f.name,data:r.result}); finish(); } };
    r.onerror=()=>finish();
    r.readAsDataURL(f);
  });
}

/* ---- Phase 2: read an itinerary screenshot and fill ONLY the missing show fields ---- */
function applyScanToShow(e, f){
  if(!e || !f) return [];
  const filled=[];
  if(!e.setTime   && f.setTime)      { e.setTime=f.setTime;         filled.push('set time'); }
  if(!e.endTime   && f.endTime)      { e.endTime=f.endTime;         filled.push('end time'); }
  if(!e.venueAddr && f.venueAddress) { e.venueAddr=f.venueAddress;  filled.push('venue address'); }
  if(!e.city      && f.city)         { e.city=f.city;               filled.push('city'); }
  const a = e.advance || (e.advance = {});
  const advIf=(key,val,label)=>{ if(!a[key] && val){ a[key]=val; filled.push(label); } };
  advIf('soundcheck',   f.soundcheck,   'sound check');
  advIf('curfew',       f.curfew,       'curfew');
  advIf('access',       f.doors,        'doors');
  advIf('stage',        f.stage,        'stage');
  advIf('guestlist',    f.guestlist,    'guest list');
  advIf('catering',     f.catering,     'catering');
  advIf('dressingRoom', f.dressingRoom, 'dressing room');
  advIf('parking',      f.parking,      'parking');
  advIf('wifi',         f.wifi,         'wifi');
  advIf('remarks',      f.remarks,      'remarks');
  if(!e.hotel && (f.hotelName || f.hotelAddress)){
    e.hotel={ name:f.hotelName||'', address:f.hotelAddress||'', checkin:f.hotelCheckin||'', checkout:'', conf:'', notes:'' };
    filled.push('hotel');
  }
  if(!e.driver && (f.driverName || f.driverPhone)){
    e.driver={ name:f.driverName||'', phone:f.driverPhone||'', whatsapp:'', pickup:'', notes:'' };
    filled.push('driver');
  }
  return filled;
}
function scanBtnReset(){ const b=$('#itn-scan'); if(b){ b.disabled=false; b.innerHTML=ICON.checkList(16)+' Scan &amp; auto-fill show'; } }
async function scanItinerary(id){
  const it=(store.itineraries||[]).find(x=>x.id===id); if(!it) return;
  const pick = rawVal('itn-show');
  const showId = pick || it.showId;
  if(!showId){ toast('Pick a show first','x'); return; }
  if(pick && pick!==it.showId){ it.showId=pick; }
  const e=sel.event(showId); if(!e){ toast('Show not found','x'); return; }
  const img=(it.imgs||[]).find(im=>im.kind==='image');
  if(!img){ toast('Add a screenshot first','x'); return; }
  if(!syncConfigured()){ toast('Cloud sync not connected','x'); return; }
  const btn=$('#itn-scan'); if(btn){ btn.disabled=true; btn.textContent='Scanning…'; }
  toast('Scanning itinerary…','image');
  try{
    const res=await fetch(SYNC_CONFIG.url.replace(/\/$/,'')+'/functions/v1/scan-itinerary', {
      method:'POST',
      headers:{ 'apikey':SYNC_CONFIG.anon, 'Authorization':'Bearer '+SYNC_CONFIG.anon, 'Content-Type':'application/json' },
      body: JSON.stringify({ image: img.data })
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok || (data && data.error)){ toast('Scan failed'+(data&&data.error?': '+data.error:''),'x'); scanBtnReset(); return; }
    const f=(data&&data.fields)||{};
    if(!Object.keys(f).length){ toast('Nothing readable found','x'); scanBtnReset(); return; }
    const filled=applyScanToShow(e, f);
    persist();
    if(filled.length){ closeSheet(); renderView(); toast('Filled: '+filled.join(', '),'check'); }
    else { toast('Show already has this info','check'); scanBtnReset(); }
  }catch(err){ toast('Scan error','x'); scanBtnReset(); }
}

/* ---------- STATS (hidden in settings) ---------- */
function computeStats(){
  const shows = sel.events();
  const travel = store.events.filter(e=>e.kind==='travel');
  const flights = travel.filter(e=>(e.icon||'plane')==='plane');
  // flight time: sum (end-start), handle overnight (+24h). Rough — ignores timezones.
  let flightMins=0;
  flights.forEach(f=>{ if(f.start&&f.end){ const [h1,m1]=f.start.split(':').map(Number),[h2,m2]=f.end.split(':').map(Number); let d=(h2*60+m2)-(h1*60+m1); if(d<0)d+=1440; if(d>0&&d<20*60) flightMins+=d; } });
  const rr = runs();
  let daysAway=0; rr.forEach(r=>{ daysAway += (dayIdx(r.end)-dayIdx(r.start)+1); });
  const cities = [...new Set(shows.map(s=>s.city).filter(Boolean))];
  // fees
  const s = money.summary(shows);
  // busiest month
  const bym={}; shows.forEach(sh=>{ const d=parseDT(sh.date); if(d){ const k=MONTHS[d.getMonth()]+' '+d.getFullYear(); bym[k]=(bym[k]||0)+1; } });
  let busiest='—',bmax=0; Object.entries(bym).forEach(([k,v])=>{ if(v>bmax){bmax=v;busiest=k;} });
  const today=new Date(); today.setHours(0,0,0,0);
  const upcoming = shows.filter(e=>parseDT(e.date)>=today).length;
  return { shows:shows.length, upcoming, past:shows.length-upcoming, flights:flights.length,
    flightHrs:Math.round(flightMins/60), flightDays:(flightMins/1440).toFixed(1),
    tours:rr.length, daysAway, cities:cities.length, hotels:store.events.filter(e=>e.kind==='stay').length,
    grossBase:s.grossBase, netBase:s.netBase, busiest, busiestN:bmax };
}

/* ============================================================
   DAY SHEET — shareable advancing doc (ABOSS core, beaten on UX)
   ============================================================ */
function buildDaySheet(e){
  const c = money.eventCalc(e);
  const L=[];
  L.push(`🎧 DAY SHEET — ${e.venue||'Show'}`);
  L.push(`${e.city||''}${e.country?', '+e.country:''} · ${fmtDateLong(e.date)}`);
  L.push('');
  L.push('⏱ SCHEDULE');
  if(e.arrival) L.push(`  Arrival: ${e.arrival}`);
  if(e.flights&&e.flights.length) e.flights.forEach(f=>L.push(`  Flight ${f.code}: ${f.from} ${f.dep?f.dep.split(' ')[1]:''} → ${f.to} ${f.arr?f.arr.split(' ')[1]:''}${f.seat?' (seat '+f.seat+')':''}`));
  (e.timeline||[]).forEach(s=>L.push(`  ${s.time||''} ${s.title}`));
  if(e.setTime) L.push(`  Set time: ${e.setTime}`);
  L.push('');
  L.push('📍 VENUE');
  L.push(`  ${e.venue||''}`);
  if(e.venueAddr) L.push(`  ${e.venueAddr}`);
  if(e.hotel){ L.push(''); L.push('🏨 HOTEL'); L.push(`  ${e.hotel.name||''}`); if(e.hotel.address)L.push(`  ${e.hotel.address}`); if(e.hotel.conf)L.push(`  Conf: ${e.hotel.conf}`); if(e.hotel.checkin)L.push(`  ${fmtDate(e.hotel.checkin)} → ${e.hotel.checkout?fmtDate(e.hotel.checkout):''}`); }
  const contacts=[];
  if(e.driver) contacts.push(`  Driver — ${e.driver.name||''} ${e.driver.phone||''}`);
  if(e.promoter) contacts.push(`  Promoter — ${e.promoter.name||''} ${e.promoter.phone||''}`);
  if(contacts.length){ L.push(''); L.push('📞 CONTACTS'); contacts.forEach(x=>L.push(x)); }
  if(e.content){ L.push(''); L.push('🎬 CONTENT'); L.push(`  ${e.content}`); }
  if(c.gross){ L.push(''); L.push('💷 DEAL'); L.push(`  ${e.finance.dealType}: ${fmtMoney(c.gross,c.cur)} (${c.paid?'paid':'unpaid'})`); L.push(`  Net take-home: ${fmtMoney(c.net,c.cur)}`); }
  if(e.notes){ L.push(''); L.push('📝 NOTES'); L.push(`  ${e.notes}`); }
  L.push('');
  L.push('— via Operate');
  return L.join('\n');
}
function shareDaySheet(eid){
  const e=sel.event(eid); const text=buildDaySheet(e);
  const title=`Day Sheet — ${e.venue}`;
  if(navigator.share){ navigator.share({title, text}).then(()=>toast('Shared','share')).catch(()=>previewDaySheet(text)); }
  else previewDaySheet(text);
}
function previewDaySheet(text){
  window.__daysheet = text;
  openSheet('Day sheet', `
    <div class="card" style="white-space:pre-wrap;font-size:13.5px;line-height:1.55;font-family:ui-monospace,Menlo,monospace;color:var(--text-2);max-height:52dvh;overflow:auto">${esc(text)}</div>
    <div class="spacer"></div>
    <button class="btn" onclick="copyText(window.__daysheet); closeSheet();">${ICON.copy(16)} Copy day sheet</button>
    <div class="spacer"></div>
  `, {});
}

function nextInvoiceNumber(){
  const s=store.settings; const yr=parseDT(todayISO()).getFullYear();
  const num = `${s.invoicePrefix}-${yr}-${pad(s.invoiceSeq)}`;
  return num;
}
function todayISO(){ const t=new Date(); return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`; }
function createInvoiceFromEvent(eid){
  const e=sel.event(eid);
  if(store.invoices.some(iv=>iv.eventId===eid)){ const ex=store.invoices.find(iv=>iv.eventId===eid); toast('Invoice already exists','receipt'); openView('invoice', ex.id); return; }
  const f=e.finance||{}; const cur=f.currency||store.settings.baseCurrency;
  const client = e.promoter?e.promoter.name:(e.venue||'Client');
  const lines=[{label:`${f.dealType||'Performance fee'} — ${e.venue}, ${e.city} (${fmtDate(e.date)})`, amount:+f.fee||0}];
  if(+f.perDiem>0) lines.push({label:'Per diem', amount:+f.perDiem});
  const inv={
    id:uid('inv'), number:nextInvoiceNumber(), eventId:eid, date:todayISO(),
    client, clientAddr:'', currency:cur, lines, status:'draft',
    terms:store.settings.invoiceTerms||14,
  };
  store.settings.invoiceSeq++;
  store.invoices.push(inv); persist();
  if(!store.settings.billing.name){ closeSheet(); toast('Add your billing details','receipt'); openBilling(inv.id); }
  else openView('invoice', inv.id);
}

  if(b.taxId) L.push(`VAT/Tax: ${b.taxId}`);
  L.push(''); L.push(`Bill to: ${inv.client}`); if(inv.clientAddr) L.push(inv.clientAddr);
  L.push(''); L.push(`Issued: ${fmtDate(inv.date)}   Due: ${fmtDate(due)}`); L.push('');
  inv.lines.forEach(l=>L.push(`- ${l.label}: ${fmtMoney(l.amount,inv.currency)}`));
  L.push(''); L.push(`TOTAL DUE: ${fmtMoney(total,inv.currency)}`);
  if(b.iban) L.push(`\nPayment: ${b.iban}`);
  L.push('\n— via Operate');
  return L.join('\n');
}
function shareInvoice(id){
  const inv=store.invoices.find(x=>x.id===id); const text=buildInvoiceText(inv);
  if(inv.status==='draft'){ inv.status='sent'; persist(); }
  if(navigator.share){ navigator.share({title:`Invoice ${inv.number}`, text}).then(()=>{renderView();toast('Shared','share');}).catch(()=>{ window.__daysheet=text; previewDaySheet(text); }); }
  else { previewDaySheet(text); renderView(); }
}

/* ============================================================
   CONTACTS HUB — reusable, tagged (ABOSS weak point)
   ============================================================ */
const ROLES = {Promoter:'#ff375f', Driver:'#32d74b', Agent:'#6d5efc', Manager:'#0a84ff', Venue:'#ff9f0a', Label:'#40cbe0', Other:'#8b7dff'};
let contactFilter='all';
function viewContacts(){
  const all = store.contacts.slice().sort((a,b)=>a.name.localeCompare(b.name));
  const roles = [...new Set(all.map(c=>c.role))];
  let list = contactFilter==='all'? all : all.filter(c=>c.role===contactFilter);
  return `
  <div class="detail-top"><div class="detail-bar">
    <button class="back-btn" onclick="back()">${ICON.chevL(20)} Home</button>
    <div style="font-size:16px;font-weight:700">Contacts</div>
    <button class="header-btn" style="width:36px;height:36px" onclick="sheetContact()">${ICON.plus(20)}</button>
  </div></div>
  <div class="screen-pad">
    <div class="chips">
      <button class="chip ${contactFilter==='all'?'on':''}" onclick="contactFilter='all';renderView()">All ${all.length}</button>
      ${roles.map(r=>`<button class="chip ${contactFilter===r?'on':''}" onclick="contactFilter='${r}';renderView()">${r}</button>`).join('')}
    </div>
    <div class="section" style="margin-top:14px">
      ${list.length?`<div class="card flush stagger">${list.map(contactRow).join('')}</div>`
        :`<div class="empty"><div class="ic">${ICON.users(26)}</div><b>No contacts</b><span>Save promoters, drivers and agents once — reuse them on every show.</span></div>`}
    </div>
    <div class="section"><button class="btn" onclick="sheetContact()">${ICON.plus(17)} Add contact</button></div>
    <div class="spacer"></div>
  </div>`;
}
function contactRow(c){
  const col=ROLES[c.role]||ROLES.Other;
  return `<div class="row" onclick="contactCard('${c.id}')">
    <div class="ic" style="background:${col}22;color:${col};font-weight:800;font-size:15px">${esc((c.name||'?').trim()[0]||'?').toUpperCase()}</div>
    <div class="body"><b>${esc(c.name)}</b><span>${esc(c.role)}${c.company?' · '+esc(c.company):''}</span></div>
    <div class="trail">
      ${c.phone?`<button class="header-btn" style="width:34px;height:34px" onclick="event.stopPropagation();callNumber('${c.phone}')">${ICON.phone(15)}</button>`:''}
      ${c.whatsapp||c.phone?`<button class="header-btn" style="width:34px;height:34px" onclick="event.stopPropagation();whatsapp('${c.whatsapp||c.phone}')">${ICON.chat(15)}</button>`:''}
    </div>
  </div>`;
}
function contactCard(id){
  const c=store.contacts.find(x=>x.id===id); const col=ROLES[c.role]||ROLES.Other;
  openSheet(c.name, `
    <div style="display:flex;align-items:center;gap:13px;margin-bottom:16px">
      <div style="width:54px;height:54px;border-radius:16px;background:${col}22;color:${col};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px">${esc((c.name||'?').trim()[0]||'?').toUpperCase()}</div>
      <div><div style="font-size:19px;font-weight:750">${esc(c.name)}</div><div style="color:var(--text-2);font-weight:600"><span class="tag" style="background:${col}22;color:${col}">${esc(c.role)}</span>${c.company?' '+esc(c.company):''}</div></div>
    </div>
    <div class="act-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
      <button class="act" onclick="callNumber('${c.phone||''}')"><div class="ic" style="background:var(--green-soft);color:var(--green)">${ICON.phone(19)}</div><span>Call</span></button>
      <button class="act" onclick="whatsapp('${c.whatsapp||c.phone||''}')"><div class="ic" style="background:var(--green-soft);color:var(--green)">${ICON.chat(19)}</div><span>WhatsApp</span></button>
      <button class="act" onclick="${c.email?`window.location.href='mailto:${c.email}'`:`toast('No email','x')`}"><div class="ic" style="background:var(--blue-soft);color:var(--blue)">${ICON.note(19)}</div><span>Email</span></button>
      <button class="act" onclick="copyText('${esc(c.phone||'')}')"><div class="ic" style="background:var(--card-2);color:var(--text-2)">${ICON.copy(19)}</div><span>Copy</span></button>
    </div>
    ${c.phone?`<div class="info-line" style="border:1px solid var(--stroke);border-radius:12px;margin-bottom:8px" onclick="copyText('${esc(c.phone)}')"><div class="ic">${ICON.phone(16)}</div><div class="tx"><div class="k">Phone</div><div class="v">${esc(c.phone)}</div></div></div>`:''}
    ${c.email?`<div class="info-line" style="border:1px solid var(--stroke);border-radius:12px;margin-bottom:8px" onclick="copyText('${esc(c.email)}')"><div class="ic">${ICON.note(16)}</div><div class="tx"><div class="k">Email</div><div class="v">${esc(c.email)}</div></div></div>`:''}
    ${c.notes?`<div class="info-line" style="border:1px solid var(--stroke);border-radius:12px;margin-bottom:8px"><div class="ic">${ICON.edit(16)}</div><div class="tx"><div class="k">Notes</div><div class="v" style="font-size:14px">${esc(c.notes)}</div></div></div>`:''}
    <div class="spacer"></div>
    <div class="btn-row"><button class="btn secondary" onclick="sheetContact('${c.id}')">${ICON.edit(15)} Edit</button><button class="btn danger" style="flex:0 0 auto" onclick="delContact('${c.id}')">${ICON.trash(15)}</button></div>
    <div class="spacer"></div>
  `);
}
function sheetContact(id){
  const c = id? store.contacts.find(x=>x.id===id):null;
  openSheet(id?'Edit contact':'New contact', `
    <div class="field"><label>Name</label><input id="co-name" class="input" value="${esc(c?c.name:'')}" placeholder="Full name"></div>
    <div class="row-2">
      <div class="field"><label>Role</label><select id="co-role" class="input">${Object.keys(ROLES).map(r=>`<option ${(c?c.role:'Promoter')===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Company</label><input id="co-company" class="input" value="${esc(c?c.company:'')}" placeholder="Club / agency"></div>
    </div>
    <div class="field"><label>Phone</label><input id="co-phone" type="tel" class="input" value="${esc(c?c.phone:'')}"></div>
    <div class="field"><label>WhatsApp (if different)</label><input id="co-wa" type="tel" class="input" value="${esc(c?c.whatsapp:'')}"></div>
    <div class="field"><label>Email</label><input id="co-email" type="email" class="input" value="${esc(c?c.email:'')}"></div>
    <div class="field"><label>Notes</label><textarea id="co-notes" class="textarea" style="min-height:60px">${esc(c?c.notes:'')}</textarea></div>
    <button class="btn" id="co-save" onclick="saveContact('${id||''}')">${id?'Save':'Add contact'}</button><div class="spacer"></div>
  `);
}
function saveContact(id){
  const name=val('co-name'); if(!name){ toast('Add a name','x'); return; }
  const data={name, role:rawVal('co-role'), company:val('co-company'), phone:val('co-phone'), whatsapp:val('co-wa'), email:val('co-email'), notes:val('co-notes')};
  withButton($('#co-save'), ()=>{
    if(id){ Object.assign(store.contacts.find(x=>x.id===id), data); }
    else { store.contacts.push(Object.assign({id:uid('con'), created:nowMs()}, data)); }
    persist(); closeSheet(); if(overlay&&overlay.type==='contacts') renderView(); else openView('contacts');
  }, id?'Contact saved':'Contact added');
}
function delContact(id){ confirmSheet('Delete contact?','','Delete',()=>{ store.contacts=store.contacts.filter(x=>x.id!==id); persist(); closeSheet(); if(overlay&&overlay.type==='contacts') renderView(); }, true); }

/* ---------- Launch ---------- */
boot();

/* ---------- PWA: register offline service worker ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
</html>
