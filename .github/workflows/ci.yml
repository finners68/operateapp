name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check all JS
        run: node scripts/check-syntax.mjs
      - name: Unit tests
        run: node --test
      - name: Build config + SW version (placeholder env)
        run: node scripts/generate-config.mjs
